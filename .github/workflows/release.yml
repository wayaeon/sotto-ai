name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python + uv
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv

      - name: Install Python deps + build sidecar
        run: |
          uv pip install -r sidecar/requirements.txt --python python
          pip install pyinstaller
          pyinstaller --onefile --name sidecar --distpath src-tauri/binaries sidecar/main.py
          mv src-tauri/binaries/sidecar.exe src-tauri/binaries/sidecar-x86_64-pc-windows-msvc.exe

      - name: Install JS deps
        run: pnpm install

      - name: Build and sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Wispr Local v__VERSION__"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install uv pyinstaller
      - run: |
          uv pip install -r sidecar/requirements.txt --python python
          pyinstaller --onefile --name sidecar --distpath src-tauri/binaries sidecar/main.py
          mv src-tauri/binaries/sidecar src-tauri/binaries/sidecar-aarch64-apple-darwin
      - run: pnpm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Wispr Local v__VERSION__"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
